<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Sign Up</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Skranji:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="sidebar">
      <div>
        <img src="assets/odin-lined.png" alt="" id="odin-logo" />
        <p class="skranji-regular">ODIN</p>
      </div>
      <p id="attribution">
        Photo by
        <a
          href="https://unsplash.com/@rohit_kumar_21?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText"
          >Rohit Kumar</a
        >
        on
        <a
          href="https://unsplash.com/photos/a-motorcycle-parked-on-a-road-idzQ-cyYFb4?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText"
          >Unsplash</a
        >
      </p>
    </div>
    <div id="hero">
      <div id="hero-text">
        <h3>
          This is not a real online service! You know you need something like this in your life to
          help you realize your deepest dreams.
        </h3>
        <h1>Sign up <em>now</em> to get started.</h1>
        <h2>You <em>know</em> you want to.</h2>
      </div>
      <form action="#" method="post">
        <div>
          <div>
            <label for="first_name">first name</label>
            <input type="text" name="firstName" id="first_name" value="Thor" placeholder="John..."/>
          </div>
          <div>
            <label for="last_name">last name</label>
            <input type="text" name="lastName" id="last_name" value="Odinson" placeholder="Doe..."/>
          </div>
        </div>
        <div>
          <div>
            <label for="email">email</label>
            <input type="email" name="email" id="email" placeholder="abc@example.com"/>
          </div>
          <div>
            <label for="phone">phone number</label>
            <input type="tel" name="phoneNum" id="phone" placeholder="873XXXXXXX" minlength="10" maxlength="10"/>
          </div>
        </div>
        <div>
          <div>
            <label for="pass">password</label>
            <input type="password" name="pwd" id="pass" />
          </div>
          <div>
            <label for="confirm-pass">confirm password</label>
            <input type="password" name="confirmPwd" id="confirm-pass" />
          </div>
        </div>
      </form>
      <div id="account">
        <button type="submit">Create Account</button>
        <p>Already have an account? <a href="#">Log in</a></p>
      </div>
    </div>
  </body>
</html>
